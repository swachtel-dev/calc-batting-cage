<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Batting Cage — Calc II</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
  :root {
    --font-display: 'Syne', sans-serif;
    --font-body: 'Work Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --max-w: 860px;
  }

  [data-theme="dark"] {
    --bg-0: #0f0f12;
    --bg-1: #17171c;
    --bg-2: #1a1a1f;
    --bg-3: #222228;
    --border: #2a2a32;
    --border-hover: #3a3a44;
    --text-1: #ececf0;
    --text-2: #a0a0ae;
    --text-3: #62626e;
    --amber: #f5a623;
    --amber-dim: #2e1f06;
    --amber-glow: rgba(245, 166, 35, 0.12);
    --green: #34d399;
    --green-dim: #062e1e;
    --red: #f87171;
    --red-dim: #2e0a0a;
    --blue: #60a5fa;
    --overlay: rgba(0,0,0,0.6);
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
    --card-active: #151518;
  }

  [data-theme="light"] {
    --bg-0: #f6f5f1;
    --bg-1: #ffffff;
    --bg-2: #f0efeb;
    --bg-3: #e8e6e0;
    --border: #dbd8d0;
    --border-hover: #c5c2ba;
    --text-1: #1a1918;
    --text-2: #6b6860;
    --text-3: #9e9b92;
    --amber: #c27a0e;
    --amber-dim: #fdf4e6;
    --amber-glow: rgba(194, 122, 14, 0.08);
    --green: #059669;
    --green-dim: #ecfdf5;
    --red: #dc2626;
    --red-dim: #fef2f2;
    --blue: #2563eb;
    --overlay: rgba(255,255,255,0.7);
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --card-active: #fffdf8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--bg-0);
    color: var(--text-1);
    min-height: 100vh;
    transition: background 0.4s var(--ease-out), color 0.3s;
    -webkit-font-smoothing: antialiased;
  }

  /* --- Background texture --- */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(var(--border) 0.5px, transparent 0.5px);
    background-size: 24px 24px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* --- Screen management --- */
  .screen { display: none; animation: fadeIn 0.35s var(--ease-out); }
  .screen.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* --- Top bar (shared) --- */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .top-bar__brand {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--text-3);
  }
  .top-bar__brand span { color: var(--amber); }
  .top-bar__right { display: flex; align-items: center; gap: 12px; }

  /* --- Theme toggle --- */
  .theme-toggle {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 44px; height: 24px;
    cursor: pointer;
    position: relative;
    transition: all 0.3s var(--ease-out);
  }
  .theme-toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--text-2);
    transition: transform 0.3s var(--ease-spring);
  }
  [data-theme="light"] .theme-toggle::after { transform: translateX(20px); }

  /* ======================= SETUP SCREEN ======================= */
  .setup-header {
    text-align: center;
    padding: 48px 0 40px;
  }
  .setup-header h1 {
    font-family: var(--font-display);
    font-size: 44px;
    font-weight: 700;
    letter-spacing: 0.01em;
    line-height: 1.1;
    margin-bottom: 10px;
  }
  .setup-header h1 span { color: var(--amber); }
  .setup-header p {
    color: var(--text-2);
    font-size: 15px;
  }

  .chapter-group {
    margin-bottom: 28px;
  }
  .chapter-group__title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.01em;
    color: var(--text-2);
    margin-bottom: 12px;
    padding-left: 2px;
  }

  .section-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
  }

  .section-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    border-radius: var(--radius-md);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.25s var(--ease-out);
    display: flex;
    align-items: center;
    gap: 12px;
    user-select: none;
  }
  .section-card:hover {
    border-color: var(--border-hover);
    background: var(--bg-2);
  }
  .section-card.on-deck {
    border-left-color: var(--amber);
    background: var(--card-active);
    box-shadow: inset 0 0 0 1px var(--amber-glow);
  }

  .section-card__num {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 13px;
    color: var(--text-3);
    background: var(--bg-2);
    padding: 3px 8px;
    border-radius: var(--radius-sm);
    white-space: nowrap;
    transition: all 0.25s;
  }
  .section-card.on-deck .section-card__num {
    color: var(--amber);
    background: var(--amber-dim);
  }

  .section-card__info { flex: 1; min-width: 0; }
  .section-card__title {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .section-card__count {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 2px;
  }

  .section-card__check {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s var(--ease-spring);
    flex-shrink: 0;
  }
  .section-card.on-deck .section-card__check {
    background: var(--amber);
    border-color: var(--amber);
  }
  .section-card__check svg {
    width: 12px; height: 12px;
    stroke: var(--bg-0);
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.2s var(--ease-spring);
  }
  .section-card.on-deck .section-card__check svg {
    opacity: 1;
    transform: scale(1);
  }

  /* Start bar */
  .start-bar {
    position: sticky;
    bottom: 0;
    background: var(--bg-0);
    border-top: 1px solid var(--border);
    padding: 16px 0 24px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
  }
  .start-bar::before {
    content: '';
    position: absolute;
    top: -24px; left: 0; right: 0; height: 24px;
    background: linear-gradient(transparent, var(--bg-0));
    pointer-events: none;
  }

  .deck-count {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-3);
  }
  .deck-count span { color: var(--amber); font-weight: 600; }

  .btn {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    border: none;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.2s var(--ease-out);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    outline: none;
  }
  .btn:focus-visible {
    box-shadow: 0 0 0 2px var(--bg-0), 0 0 0 4px var(--amber);
  }

  .btn--primary {
    background: var(--amber);
    color: #0a0a0a;
    padding: 12px 28px;
    font-size: 15px;
  }
  .btn--primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn--primary:active { transform: translateY(0); }
  .btn--primary:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
    filter: none;
  }

  .btn--ghost {
    background: transparent;
    color: var(--text-2);
    padding: 8px 16px;
    border: 1px solid var(--border);
  }
  .btn--ghost:hover { background: var(--bg-2); color: var(--text-1); }

  .btn--sm { padding: 8px 14px; font-size: 13px; }

  .select-actions {
    display: flex; gap: 8px; margin-bottom: 20px;
  }

  /* ======================= PRACTICE SCREEN ======================= */
  .practice-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .practice-bar__left {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .session-timer {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text-3);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .session-timer__dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .problem-counter {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-3);
  }
  .problem-counter span { color: var(--text-1); }

  /* Problem card */
  .problem-area {
    max-width: 640px;
    margin: 0 auto;
    text-align: center;
  }

  .problem-section-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-3);
    background: var(--bg-2);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 24px;
  }

  .problem-section-link {
    display: none;
    text-align: center;
    margin-bottom: 24px;
    animation: fadeIn 0.3s var(--ease-out);
  }
  .problem-section-link.visible { display: block; }
  .problem-section-link a {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--blue);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    transition: all 0.2s var(--ease-out);
  }
  .problem-section-link a:hover {
    background: var(--bg-3);
    text-decoration: underline;
  }
  .problem-section-link a svg {
    width: 12px; height: 12px;
    flex-shrink: 0;
  }

  .verdict-hint {
    font-size: 13px;
    color: var(--text-3);
    text-align: center;
    margin-bottom: 12px;
    line-height: 1.5;
    animation: fadeIn 0.3s var(--ease-out);
  }

  .problem-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 40px 36px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .problem-card .katex-display { margin: 0; }
  .problem-card .katex { font-size: 1.35em; }

  /* Problem timer */
  .problem-timer {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 32px;
    color: var(--amber);
    margin-bottom: 28px;
    letter-spacing: 2px;
    transition: color 0.4s, opacity 0.4s;
  }
  .problem-timer.paused {
    color: var(--text-3);
    animation: none;
  }
  /* Timer hidden mode: display still there but faint and unanimated; session timer dimmed */
  body.timer-hidden .problem-timer { visibility: hidden; height: 32px; }
  body.timer-hidden .session-timer { opacity: 0.3; }
  body.timer-hidden .session-timer__dot { animation: none; }
  .problem-timer .timer-pulse {
    display: inline-block;
    animation: timerPulse 1s ease-in-out infinite;
  }
  .problem-timer.paused .timer-pulse { animation: none; }
  @keyframes timerPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.65; }
  }

  /* Action area */
  .action-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .btn--reveal {
    background: var(--amber);
    color: #0a0a0a;
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 600;
    border-radius: var(--radius-md);
  }

  /* Answer reveal */
  .answer-area {
    display: none;
    animation: slideUp 0.35s var(--ease-out);
  }
  .answer-area.visible { display: block; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .answer-divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  .answer-label {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-3);
    margin-bottom: 12px;
  }

  .answer-display {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .answer-display .katex { font-size: 1.2em; }

  /* Solution walkthrough */
  .solution-toggle {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--text-3);
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 0 auto 20px;
    padding: 4px 8px;
    transition: color 0.2s;
  }
  .solution-toggle:hover { color: var(--text-2); }
  .solution-toggle svg {
    width: 14px; height: 14px;
    transition: transform 0.3s var(--ease-out);
  }
  .solution-toggle.expanded svg { transform: rotate(180deg); }

  .solution-content {
    display: none;
    text-align: left;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 20px 24px;
    margin-bottom: 20px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-2);
  }
  .solution-content.visible { display: block; animation: fadeIn 0.3s var(--ease-out); }
  .solution-content .katex { font-size: 1em; }

  /* Verdict buttons */
  .verdict-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .btn--correct {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid var(--green);
    padding: 10px 24px;
    border-radius: var(--radius-md);
    font-weight: 600;
  }
  .btn--correct:hover { filter: brightness(1.15); }

  .btn--wrong {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid var(--red);
    padding: 10px 24px;
    border-radius: var(--radius-md);
    font-weight: 600;
  }
  .btn--wrong:hover { filter: brightness(1.15); }

  .btn--skip {
    background: transparent;
    color: var(--text-3);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: var(--radius-md);
  }
  .btn--skip:hover { background: var(--bg-2); }

  .btn--next {
    background: var(--bg-3);
    color: var(--text-1);
    padding: 12px 32px;
    font-size: 15px;
    border-radius: var(--radius-md);
  }
  .btn--next:hover { filter: brightness(1.15); transform: translateY(-1px); }

  .key-hint {
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--text-3);
    margin-left: 4px;
    vertical-align: middle;
  }

  /* ======================= RESULTS SCREEN ======================= */
  .results-header {
    text-align: center;
    padding: 40px 0 32px;
  }
  .results-header h2 {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 28px;
    margin-bottom: 8px;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px 24px;
    text-align: center;
    min-width: 120px;
  }
  .stat-card__value {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 24px;
    color: var(--text-1);
    margin-bottom: 4px;
  }
  .stat-card__value.amber { color: var(--amber); }
  .stat-card__value.green { color: var(--green); }
  .stat-card__label {
    font-size: 12px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Results table */
  .results-table-wrap {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 40px;
  }

  .results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .results-table th {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-3);
    text-align: left;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-2);
  }
  .results-table td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .results-table tr:last-child td { border-bottom: none; }
  .results-table .katex { font-size: 0.9em; }

  .result-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-weight: 600;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .result-badge.correct { background: var(--green-dim); color: var(--green); }
  .result-badge.wrong { background: var(--red-dim); color: var(--red); }
  .result-badge.skipped { background: var(--bg-2); color: var(--text-3); }

  .review-link {
    font-size: 13px;
    color: var(--blue);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .review-link:hover { text-decoration: underline; }
  .review-link svg { width: 12px; height: 12px; }

  .results-actions {
    text-align: center;
    padding-bottom: 48px;
  }

  /* ======================= RESPONSIVE ======================= */
  @media (max-width: 600px) {
    .setup-header h1 { font-size: 28px; }
    .section-grid { grid-template-columns: 1fr; }
    .problem-card { padding: 28px 20px; }
    .problem-timer { font-size: 26px; }
    .stats-row { gap: 12px; }
    .stat-card { min-width: 90px; padding: 12px 16px; }
    .stat-card__value { font-size: 20px; }
    .verdict-row { flex-wrap: wrap; }
    .results-table { font-size: 13px; }
    .results-table th, .results-table td { padding: 10px 12px; }
    .start-bar { flex-direction: column; gap: 12px; }
  }

  .result-actions-cell {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }
  .result-walkthrough-toggle {
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--text-3);
    background: none;
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 0;
    transition: color 0.2s;
  }
  .result-walkthrough-toggle:hover { color: var(--text-1); }
  .result-walkthrough-toggle svg {
    width: 12px; height: 12px;
    transition: transform 0.25s var(--ease-out);
  }
  .result-walkthrough-toggle.expanded svg { transform: rotate(180deg); }
  .result-walkthrough-row td {
    background: var(--bg-2);
    padding: 0 16px 16px !important;
  }
  .result-walkthrough-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 12px 4px 4px;
  }
  @media (max-width: 720px) {
    .result-walkthrough-body { grid-template-columns: 1fr; }
  }
  .result-walkthrough-label {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.5px;
    color: var(--text-3);
    margin-bottom: 6px;
  }
  .result-walkthrough-answer,
  .result-walkthrough-solution {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-2);
  }
  .result-walkthrough-answer .katex { font-size: 1em; }

</style>
</head>
<body>

<div class="container">

  <!-- =================== SETUP SCREEN =================== -->
  <div id="setup-screen" class="screen active">
    <div class="top-bar">
      <div class="top-bar__brand">The Batting <span>Cage</span></div>
      <div class="top-bar__right">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
      </div>
    </div>

    <div class="setup-header">
      <h1>Calculus <span>II</span></h1>
      <p>Select sections to load, then step up to the plate.</p>
    </div>

    <div class="select-actions">
      <button class="btn btn--ghost btn--sm" onclick="selectAll()">Select all</button>
      <button class="btn btn--ghost btn--sm" onclick="clearAll()">Clear</button>
    </div>

    <div id="section-list"></div>

    <div class="start-bar">
      <div class="deck-count" id="deck-count">
        <span>0</span> problems on deck
      </div>
      <button class="btn btn--primary" id="start-btn" disabled onclick="startSession()">
        Start Session
      </button>
    </div>
  </div>

  <!-- =================== PRACTICE SCREEN =================== -->
  <div id="practice-screen" class="screen">
    <div class="practice-bar">
      <div class="practice-bar__left">
        <div class="session-timer">
          <div class="session-timer__dot"></div>
          <span id="session-timer-display">0:00</span>
        </div>
        <div class="problem-counter">
          <span id="problem-current">1</span> / <span id="problem-total">12</span>
        </div>
      </div>
      <div class="practice-bar__right" style="display:flex;gap:8px;align-items:center">
        <button class="btn btn--ghost btn--sm" id="timer-toggle" onclick="toggleTimer()" aria-pressed="false" title="Hide the timer if it feels stressful. Time still tracks for your results.">Hide timer</button>
        <button class="btn btn--ghost btn--sm" onclick="endSession()">End session</button>
      </div>
    </div>

    <div class="problem-area">
      <div class="problem-section-tag" id="problem-section-tag">
        <span id="problem-section-num"></span>
        <span id="problem-section-title"></span>
      </div>

      <div class="problem-section-link" id="problem-section-link"></div>

      <div class="problem-prompt" id="problem-prompt" style="font-size:15px;color:var(--text-2);margin-bottom:16px;line-height:1.5"></div>

      <div class="problem-card" id="problem-display"></div>

      <div class="problem-timer" id="problem-timer">
        <span class="timer-pulse" id="problem-timer-display">0:00</span>
      </div>

      <div class="action-area">
        <div id="pre-reveal">
          <button class="btn btn--reveal" onclick="revealAnswer()">
            Show Answer <span class="key-hint">Space</span>
          </button>
        </div>

        <div class="answer-area" id="post-reveal">
          <div class="answer-divider"></div>
          <div class="answer-label">Answer</div>
          <div class="answer-display" id="answer-display"></div>

          <button class="solution-toggle" id="solution-toggle" onclick="toggleSolution()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
            Show walkthrough
          </button>
          <div class="solution-content" id="solution-content"></div>

          <div class="verdict-hint" id="verdict-hint">
            Track your progress. An honest call here helps the session surface your weak spots.
          </div>

          <div class="verdict-row">
            <button class="btn btn--correct" onclick="markResult('correct')">
              Correct <span class="key-hint">1</span>
            </button>
            <button class="btn btn--wrong" onclick="markResult('wrong')">
              Wrong <span class="key-hint">2</span>
            </button>
            <button class="btn btn--skip" onclick="markResult('skip')">
              Skip <span class="key-hint">3</span>
            </button>
          </div>

          <button class="btn btn--next" onclick="nextProblem()">
            Next <span class="key-hint">Enter</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- =================== RESULTS SCREEN =================== -->
  <div id="results-screen" class="screen">
    <div class="top-bar">
      <div class="top-bar__brand">The Batting <span>Cage</span></div>
      <div class="top-bar__right">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
      </div>
    </div>

    <div class="results-header">
      <h2>Session Complete</h2>
    </div>

    <div class="stats-row" id="stats-row"></div>

    <div class="results-table-wrap">
      <table class="results-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Section</th>
            <th>Problem</th>
            <th>Result</th>
            <th>Time</th>
            <th>Paul's Notes</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>

    <div class="results-actions">
      <button class="btn btn--primary" onclick="backToSetup()">Practice Again</button>
    </div>
  </div>

</div>

<script>
// ========================= PROBLEM DATA =========================
// Inline SECTIONS block removed 2026-04-24. Data now loaded from problems.json
// at runtime (see loadProblems() below). Use build_problems.py to regenerate.
const SECTIONS = {};

// ========================= APP STATE =========================
const state = {
  selectedSections: new Set(),
  queue: [],
  currentIndex: 0,
  results: [],
  sessionStart: null,
  problemStart: null,
  sessionInterval: null,
  problemInterval: null,
  revealed: false,
  solutionExpanded: false,
  firstProblemSeen: false,
};

// ========================= INIT =========================
document.addEventListener('DOMContentLoaded', () => {
  loadProblems().then(() => {
    renderSectionList();
    document.addEventListener('keydown', handleKeyboard);
  }).catch(err => {
    console.error('Failed to load problems.json', err);
    const container = document.getElementById('section-list');
    if (container) container.innerHTML = '<div style="padding:20px;color:var(--red)">Failed to load problems. Check console.</div>';
  });
});

async function loadProblems() {
  // Fetch the external problems.json. The inline `SECTIONS` const below is
  // retained as a fallback (for file:// loads where fetch may block, or
  // offline opens); problems.json wins when it loads successfully.
  try {
    const r = await fetch('problems.json', { cache: 'no-cache' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    // Clear the inline fallback and replace with the loaded data
    for (const k of Object.keys(SECTIONS)) delete SECTIONS[k];
    Object.assign(SECTIONS, data);
  } catch (e) {
    console.warn('Using inline fallback SECTIONS (fetch failed):', e.message);
  }
}

function renderSectionList() {
  const container = document.getElementById('section-list');
  // Group by course unit; fall back to chapter for sections without a unit.
  const grouped = new Map();
  for (const [id, sec] of Object.entries(SECTIONS)) {
    const unit = sec.unit || 0;
    if (!grouped.has(unit)) {
      grouped.set(unit, {
        title: sec.unitTitle || `Ch ${sec.chapterNum}: ${sec.chapter}`,
        sections: [],
      });
    }
    grouped.get(unit).sections.push(sec);
  }
  const ordered = [...grouped.entries()].sort((a, b) => a[0] - b[0]);

  let html = '';
  for (const [u, group] of ordered) {
    const label = u ? `Unit ${u} \u00b7 ${group.title}` : group.title;
    html += `<div class="chapter-group">
      <div class="chapter-group__title">${label}</div>
      <div class="section-grid">`;
    for (const sec of group.sections) {
      html += `<div class="section-card" data-id="${sec.id}" onclick="toggleSection('${sec.id}')">
        <div class="section-card__num">\u00a7${sec.id}</div>
        <div class="section-card__info">
          <div class="section-card__title">${sec.title}</div>
          <div class="section-card__count">${sec.problems.length} problems</div>
        </div>
        <div class="section-card__check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="4 12 10 18 20 6"/>
          </svg>
        </div>
      </div>`;
    }
    html += `</div></div>`;
  }
  container.innerHTML = html;
}

// ========================= SETUP ACTIONS =========================
function toggleSection(id) {
  if (state.selectedSections.has(id)) {
    state.selectedSections.delete(id);
  } else {
    state.selectedSections.add(id);
  }
  updateSetupUI();
}

function selectAll() {
  for (const id of Object.keys(SECTIONS)) state.selectedSections.add(id);
  updateSetupUI();
}

function clearAll() {
  state.selectedSections.clear();
  updateSetupUI();
}

function updateSetupUI() {
  document.querySelectorAll('.section-card').forEach(card => {
    card.classList.toggle('on-deck', state.selectedSections.has(card.dataset.id));
  });

  let count = 0;
  for (const id of state.selectedSections) count += SECTIONS[id].problems.length;

  const countEl = document.getElementById('deck-count');
  countEl.innerHTML = `<span>${count}</span> problem${count !== 1 ? 's' : ''} on deck`;

  document.getElementById('start-btn').disabled = count === 0;
}

// ========================= SESSION =========================
function startSession() {
  // Build and shuffle queue
  state.queue = [];
  for (const id of state.selectedSections) {
    for (const prob of SECTIONS[id].problems) {
      state.queue.push({ ...prob, sectionId: id });
    }
  }
  shuffle(state.queue);

  state.currentIndex = 0;
  state.results = [];
  state.sessionStart = Date.now();
  state.revealed = false;
  state.firstProblemSeen = false;

  document.getElementById('problem-total').textContent = state.queue.length;

  // Start session timer
  state.sessionInterval = setInterval(updateSessionTimer, 1000);

  showScreen('practice');
  showProblem();
}

function endSession() {
  // If current problem not yet answered, record as skip
  if (state.currentIndex < state.queue.length && !state.results[state.currentIndex]) {
    const elapsed = Date.now() - state.problemStart;
    state.results[state.currentIndex] = {
      item: state.queue[state.currentIndex],
      verdict: 'skip',
      time: elapsed
    };
  }

  clearInterval(state.sessionInterval);
  clearInterval(state.problemInterval);
  showResults();
}

function showProblem() {
  const item = state.queue[state.currentIndex];
  const sec = SECTIONS[item.sectionId];

  document.getElementById('problem-current').textContent = state.currentIndex + 1;
  document.getElementById('problem-section-num').textContent = `\u00a7${sec.id}`;
  document.getElementById('problem-section-title').textContent = sec.title;

  // Show section tag (plain text), hide section link
  document.getElementById('problem-section-tag').style.display = '';
  document.getElementById('problem-section-link').classList.remove('visible');
  document.getElementById('problem-section-link').innerHTML = '';

  // Show prompt text
  const promptEl = document.getElementById('problem-prompt');
  promptEl.textContent = item.prompt || '';

  // Render problem (supports prose+math and pure math; see build_problems.py
  // normalize_problem_or_answer for the source format contract).
  const probEl = document.getElementById('problem-display');
  probEl.innerHTML = (item.problem || '').replace(/\n/g, '<br>');
  renderMathInElement(probEl, {
    delimiters: [
      { left: '\\[', right: '\\]', display: true },
      { left: '\\(', right: '\\)', display: false }
    ],
    throwOnError: false
  });

  // Reset state
  state.revealed = false;
  state.solutionExpanded = false;
  document.getElementById('pre-reveal').style.display = '';
  document.getElementById('post-reveal').classList.remove('visible');
  document.getElementById('solution-content').classList.remove('visible');
  document.getElementById('solution-toggle').classList.remove('expanded');
  document.getElementById('solution-toggle').querySelector('svg + *') ||
    (document.getElementById('solution-toggle').childNodes[1].textContent = ' Show walkthrough');

  // Reset verdict button opacity
  document.querySelectorAll('.verdict-row .btn').forEach(b => b.style.opacity = '');

  // Verdict hint visible on every problem — a gentle reminder of the point.
  const hintEl = document.getElementById('verdict-hint');
  hintEl.style.display = '';

  // Start problem timer
  state.problemStart = Date.now();
  clearInterval(state.problemInterval);
  const timerEl = document.getElementById('problem-timer');
  timerEl.classList.remove('paused');
  document.getElementById('problem-timer-display').textContent = '0:00';
  state.problemInterval = setInterval(updateProblemTimer, 1000);
}

function revealAnswer() {
  if (state.revealed) return;
  state.revealed = true;

  // Pause problem timer
  clearInterval(state.problemInterval);
  document.getElementById('problem-timer').classList.add('paused');

  // Swap section tag for clickable link
  const item = state.queue[state.currentIndex];
  const sec = SECTIONS[item.sectionId];
  document.getElementById('problem-section-tag').style.display = 'none';
  const linkEl = document.getElementById('problem-section-link');
  linkEl.innerHTML = `<a href="${sec.notesUrl}" target="_blank" rel="noopener">
    Review this topic on Paul's Online Math Notes: \u00a7${sec.id} ${sec.title}
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
      <polyline points="15 3 21 3 21 9"/>
      <line x1="10" y1="14" x2="21" y2="3"/>
    </svg>
  </a>`;
  linkEl.classList.add('visible');

  // Render answer (same format contract as problem)
  const ansEl = document.getElementById('answer-display');
  ansEl.innerHTML = (item.answer || '').replace(/\n/g, '<br>');
  renderMathInElement(ansEl, {
    delimiters: [
      { left: '\\[', right: '\\]', display: true },
      { left: '\\(', right: '\\)', display: false }
    ],
    throwOnError: false
  });

  // Prepare solution
  const solEl = document.getElementById('solution-content');
  solEl.innerHTML = item.solution.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
  renderMathInElement(solEl, {
    delimiters: [
      { left: '\\[', right: '\\]', display: true },
      { left: '\\(', right: '\\)', display: false }
    ],
    throwOnError: false
  });

  // Show answer area
  document.getElementById('pre-reveal').style.display = 'none';
  document.getElementById('post-reveal').classList.add('visible');
}

function toggleSolution() {
  state.solutionExpanded = !state.solutionExpanded;
  document.getElementById('solution-content').classList.toggle('visible', state.solutionExpanded);
  const toggle = document.getElementById('solution-toggle');
  toggle.classList.toggle('expanded', state.solutionExpanded);
}

function markResult(verdict) {
  const elapsed = Date.now() - state.problemStart;
  state.results[state.currentIndex] = {
    item: state.queue[state.currentIndex],
    verdict: verdict,
    time: elapsed
  };

  // Visual feedback on button
  const buttons = document.querySelectorAll('.verdict-row .btn');
  buttons.forEach(b => b.style.opacity = '0.4');
  if (verdict === 'correct') document.querySelector('.btn--correct').style.opacity = '1';
  else if (verdict === 'wrong') document.querySelector('.btn--wrong').style.opacity = '1';
  else document.querySelector('.btn--skip').style.opacity = '1';
}

function nextProblem() {
  // Ensure we have a result for current problem
  if (!state.results[state.currentIndex]) {
    state.results[state.currentIndex] = {
      item: state.queue[state.currentIndex],
      verdict: 'skip',
      time: Date.now() - state.problemStart
    };
  }

  // Reset button opacity
  document.querySelectorAll('.verdict-row .btn').forEach(b => b.style.opacity = '');

  state.currentIndex++;
  if (state.currentIndex >= state.queue.length) {
    endSession();
  } else {
    showProblem();
  }
}

// ========================= RESULTS =========================
function showResults() {
  const totalTime = Date.now() - state.sessionStart;
  const correct = state.results.filter(r => r && r.verdict === 'correct').length;
  const wrong = state.results.filter(r => r && r.verdict === 'wrong').length;
  const skipped = state.results.filter(r => r && r.verdict === 'skip').length;
  const total = state.results.filter(r => r).length;
  const answered = correct + wrong;
  const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : '--';

  // Stats
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-card__value amber">${formatTime(totalTime)}</div>
      <div class="stat-card__label">Total Time</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value">${total}</div>
      <div class="stat-card__label">Problems</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value green">${correct}</div>
      <div class="stat-card__label">Correct</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value">${wrong}</div>
      <div class="stat-card__label">Wrong</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value">${accuracy}${accuracy !== '--' ? '%' : ''}</div>
      <div class="stat-card__label">Accuracy</div>
    </div>
  `;

  // Table
  const tbody = document.getElementById('results-body');
  tbody.innerHTML = '';

  const MATH_DELIMS = [
    { left: '\\[', right: '\\]', display: true },
    { left: '\\(', right: '\\)', display: false },
  ];

  for (let i = 0; i < state.results.length; i++) {
    const r = state.results[i];
    if (!r) continue;
    const sec = SECTIONS[r.item.sectionId];

    const badgeClass = r.verdict === 'correct' ? 'correct' : r.verdict === 'wrong' ? 'wrong' : 'skipped';
    const badgeText = r.verdict === 'correct' ? '\u2713 Correct' : r.verdict === 'wrong' ? '\u2717 Wrong' : '\u2014 Skipped';

    const tr = document.createElement('tr');
    tr.className = 'result-row';
    tr.innerHTML = `
      <td style="font-family:var(--font-mono);color:var(--text-3);font-size:13px">${i + 1}</td>
      <td><span style="font-family:var(--font-mono);font-size:12px;color:var(--text-3)">\u00a7${sec.id}</span></td>
      <td class="result-problem-cell"></td>
      <td><span class="result-badge ${badgeClass}">${badgeText}</span></td>
      <td style="font-family:var(--font-mono);font-size:13px;color:var(--text-2)">${formatTime(r.time)}</td>
      <td>
        <div class="result-actions-cell">
          <button class="result-walkthrough-toggle" data-idx="${i}" onclick="toggleResultWalkthrough(${i})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            Walkthrough
          </button>
          <a class="review-link" href="${sec.notesUrl}" target="_blank" rel="noopener" title="Review lesson on Paul's Online Math Notes">
            Paul's \u00a7${sec.id}
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </a>
        </div>
      </td>
    `;
    tbody.appendChild(tr);

    const cell = tr.querySelector('.result-problem-cell');
    cell.innerHTML = (r.item.problem || '').replace(/\n/g, '<br>');
    renderMathInElement(cell, { delimiters: MATH_DELIMS, throwOnError: false });

    // Expandable walkthrough row
    const wtr = document.createElement('tr');
    wtr.className = 'result-walkthrough-row';
    wtr.id = `result-walkthrough-${i}`;
    wtr.style.display = 'none';
    wtr.innerHTML = `
      <td colspan="6">
        <div class="result-walkthrough-body">
          <div class="result-walkthrough-section">
            <div class="result-walkthrough-label">Answer</div>
            <div class="result-walkthrough-answer"></div>
          </div>
          <div class="result-walkthrough-section">
            <div class="result-walkthrough-label">Walkthrough</div>
            <div class="result-walkthrough-solution"></div>
          </div>
        </div>
      </td>
    `;
    tbody.appendChild(wtr);
    const ansEl = wtr.querySelector('.result-walkthrough-answer');
    ansEl.innerHTML = (r.item.answer || '').replace(/\n/g, '<br>');
    renderMathInElement(ansEl, { delimiters: MATH_DELIMS, throwOnError: false });
    const solEl = wtr.querySelector('.result-walkthrough-solution');
    solEl.innerHTML = (r.item.solution || '').replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
    renderMathInElement(solEl, { delimiters: MATH_DELIMS, throwOnError: false });
  }

  showScreen('results');
}

function toggleResultWalkthrough(idx) {
  const row = document.getElementById(`result-walkthrough-${idx}`);
  const btn = document.querySelector(`.result-walkthrough-toggle[data-idx="${idx}"]`);
  if (!row) return;
  const isHidden = row.style.display === 'none';
  row.style.display = isHidden ? '' : 'none';
  if (btn) btn.classList.toggle('expanded', isHidden);
}

function backToSetup() {
  showScreen('setup');
}

// ========================= TIMERS =========================
function updateSessionTimer() {
  const elapsed = Date.now() - state.sessionStart;
  document.getElementById('session-timer-display').textContent = formatTime(elapsed);
}

function updateProblemTimer() {
  const elapsed = Date.now() - state.problemStart;
  document.getElementById('problem-timer-display').textContent = formatTime(elapsed);
}

function formatTime(ms) {
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  return `${min}:${sec.toString().padStart(2, '0')}`;
}

// ========================= UTILITIES =========================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`${name}-screen`).classList.add('active');
  window.scrollTo(0, 0);
}

function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
}

function toggleTimer() {
  const body = document.body;
  const btn = document.getElementById('timer-toggle');
  const isHidden = body.classList.toggle('timer-hidden');
  btn.textContent = isHidden ? 'Show timer' : 'Hide timer';
  btn.setAttribute('aria-pressed', isHidden ? 'true' : 'false');
  // Persist preference
  try { localStorage.setItem('battingCage.hideTimer', isHidden ? '1' : '0'); } catch(e) {}
}

// Restore timer preference on load
document.addEventListener('DOMContentLoaded', () => {
  try {
    if (localStorage.getItem('battingCage.hideTimer') === '1') {
      document.body.classList.add('timer-hidden');
      const btn = document.getElementById('timer-toggle');
      if (btn) { btn.textContent = 'Show timer'; btn.setAttribute('aria-pressed','true'); }
    }
  } catch(e) {}
});

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function handleKeyboard(e) {
  const screen = document.querySelector('.screen.active');
  if (!screen || screen.id !== 'practice-screen') return;

  if (e.code === 'Space' && !state.revealed) {
    e.preventDefault();
    revealAnswer();
  } else if (state.revealed) {
    if (e.key === '1') markResult('correct');
    else if (e.key === '2') markResult('wrong');
    else if (e.key === '3') markResult('skip');
    else if (e.code === 'Enter') { e.preventDefault(); nextProblem(); }
  }
}
